##############################################################################
# Nginx config — Compliance Monitoring Frontend
#
# Place this file at:  /etc/nginx/sites-available/compliance
# Then enable:         sudo ln -s /etc/nginx/sites-available/compliance \
#                                 /etc/nginx/sites-enabled/
# Reload:              sudo nginx -t && sudo systemctl reload nginx
#
# Assumes:
#   - Frontend dist built to /var/www/compliance/dist
#   - Backend (FastAPI) running on localhost:8000
##############################################################################

server {
    listen 80;
    server_name _;           # Replace with your domain or VM IP if needed

    root /var/www/compliance/dist;
    index index.html;

    # ── Frontend (SPA) ───────────────────────────────────────────────────────
    # All non-file requests go to index.html so hash-router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── WebSocket (violations / SOP live events) ─────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Static images served by backend ─────────────────────────────────────
    location /stored_images/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location /stored_sop_images/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
